apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: noel-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "rootpassword"
        - name: MYSQL_DATABASE
          value: "capsule_db"
        - name: MYSQL_USER
          value: "capsule_user"
        - name: MYSQL_PASSWORD
          value: "capsule_password"
       
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: noel-ns
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP
