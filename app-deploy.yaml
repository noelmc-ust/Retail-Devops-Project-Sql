apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: retail-grant
  namespace: retail-ns
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: noel-ns
  to:
    - group: ""
      kind: Service


---
apiVersion: v1
kind: Secret
metadata:
  name: retail-secret
stringData:
  DB_HOST: mysql-service
  DB_USER: root
  DB_PASSWORD: rootpassword
  DB_NAME: capsule_db
  DB_PORT: 3306
  PORT: 3000
  NODE_ENV: production
  SESSION_SECRET: capsule-k8s-secret-change-in-production
  SESSION_MAX_AGE: 1800000
  LOW_STOCK_THRESHOLD: 5
  HIGH_STOCK_THRESHOLD: 15
  EMAIL_SERVICE: gmail
  EMAIL_USER: your-email@gmail.com
  EMAIL_PASS: your-gmail-app-password
  SUPPORT_EMAIL: support@capsule.com

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-deploy
  namespace: retail-ns
  labels:
    app: retail
spec:
  replicas: 4
  selector:
    matchLabels:
      app: retail
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: retail
    spec:
      containers:
        - name: retail-container
          image: vasuvarshney07/vasu_varshney_fordocker-app:latest
          ports:
            containerPort: 3000
          env:
            - name: DB_HOST
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: DB_NAME
            - name: PORT
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: PORT
            - name: DB_PORT
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: DB_PORT
            - name: NODE_ENV
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: NODE_ENV
            - name: SESSION_SECRET
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: SESSION_SECRET
            - name: SESSION_MAX_AGE
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: SESSION_MAX_AGE
            - name: LOW_STOCK_THRESHOLD
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: LOW_STOCK_THRESHOLD
            - name: HIGH_STOCK_THRESHOLD
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: HIGH_STOCK_THRESHOLD
            - name: EMAIL_SERVICE
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: EMAIL_SERVICE
            - name: EMAIL_USER
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: EMAIL_PASS
            - name: SUPPORT_EMAIL
              valueFrom:
                secretMapKeyRef:
                  name: retail-secret
                  key: SUPPORT_EMAIL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"

---

apiVersion: v1
kind: Service
metadata:
  name: retail-service
  namespace: retail-ns
spec:
  selector:
    app: retail
  ports:
    - port: 82
      targetPort: 3000
  type: NodePort
