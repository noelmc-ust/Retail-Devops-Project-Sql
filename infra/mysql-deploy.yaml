apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: retail-ns
stringData:
  MYSQL_ROOT_PASSWORD: rootpassword
  MYSQL_DATABASE: capsule_db
  MYSQL_USER: capsule_user
  MYSQL_PASSWORD: secure_password_123

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-state
  namespace: retail-ns
  labels:
    app: mysql
spec:
  replicas: 3
  serviceName: mysql-service 
  selector:
    matchLabels:
      app: mysql
  volumeClaimTemplates:
    - metadata: 
        name: mysql-retail-vct
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-csi-retail
        resources:
          requests:
            storage: 5Gi
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxUnavailable: 1
  #     maxSurge: 1
  template:
    metadata:
      labels:
        app: mysql
    spec:
      terminationGracePeriodSeconds: 10
      volumes:
        - name: mysql-init-scripts
          configMap:
            name: mysql-init-config
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-retail-vct
              mountPath: /var/lib/mysql
            # - name: mysql-init-scripts
            #   mountPath: /docker-entrypoint-initdb.d
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
  
---

apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: retail-ns
spec:
  selector:
    app: mysql
  clusterIP: None
  ports:
  - port: 3306
    targetPort: 3306
  

